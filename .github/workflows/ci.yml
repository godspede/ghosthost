name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # 'stable' picks the latest patch of the current stable minor,
          # so stdlib security patches land automatically. go.mod's
          # directive remains the declared minimum.
          go-version: stable
          check-latest: true
          cache: true
      - run: go vet ./...
      - run: go test -race ./...
      - name: Smoke test
        run: go test -tags=smoke -timeout=120s ./internal/smoke/...
        env:
          GH_SMOKE: "1"
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: gosec
        if: runner.os == 'Linux'   # docker-container action; Linux runners only
        uses: securego/gosec@master
        with:
          # Excluded rules (all noise-for-this-project, not security regressions):
          #   G304 — "file inclusion via variable": this is a file-sharing tool;
          #          opening variable paths is the product. Path-traversal
          #          hardening lives in internal/source (UNC / reparse-point
          #          rejection, EvalSymlinks, regular-file check).
          #   G115 — uintptr -> int in syscall.Flock on non-Windows: standard
          #          Go idiom, not a real overflow risk on any supported
          #          platform.
          #   G117 — JSON field named "secret": intentional persistence of the
          #          per-daemon admin bearer secret to the lockfile, protected
          #          by ACL on Windows and 0600 mode elsewhere.
          #   G104 — unhandled errors: remaining sites are intentional
          #          best-effort cleanups (defer f.Close, fire-and-forget
          #          history appends during shutdown).
          args: -exclude=G304,G115,G117,G104 ./...
      - name: Fuzz (short)
        run: go test -run=^$ -fuzz=FuzzContentDispositionHeader -fuzztime=30s ./internal/share/
