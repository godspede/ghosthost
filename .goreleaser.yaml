version: 2
project_name: ghosthost

builds:
  - id: ghosthost
    main: ./cmd/ghosthost
    binary: ghosthost
    env:
      - CGO_ENABLED=0
    targets:
      - windows_amd64
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
    ldflags:
      - -s -w
      - -X github.com/godspede/ghosthost/internal/version.Version={{.Version}}
      - -X github.com/godspede/ghosthost/internal/version.Commit={{.ShortCommit}}

archives:
  - formats: [ zip ]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

release:
  github:
    owner: godspede
    name: ghosthost

signs:
  - cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - ${artifact}
    artifacts: all
